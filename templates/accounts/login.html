<!-- templates/accounts/login.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}ورود به حساب کاربری | سبزلرن{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>ورود به حساب کاربری</h2>
            <p>برای دسترسی به دوره‌های خود وارد شوید</p>
        </div>
        
        <form id="loginForm" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label>شماره موبایل</label>
                <input type="tel" id="phone" name="phone" class="form-control" placeholder="09XXXXXXXXX" required>
                <small class="error-message" id="phoneError"></small>
            </div>
            
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="********" required>
                <small class="error-message" id="passwordError"></small>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                ورود
            </button>
        </form>
        
        <div class="auth-footer">
            <p>حساب کاربری ندارید؟ <a href="/account/register/">ثبت نام کنید</a></p>
        </div>
    </div>
</div>

<style>
.auth-container {
    min-height: calc(100vh - 300px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.auth-card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-header h2 {
    color: #1e293b;
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
}

.auth-header p {
    color: #64748b;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #334155;
    font-weight: 500;
}

.form-control {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    font-size: 1rem;
    transition: all 0.2s;
}

.form-control:focus {
    outline: none;
    border-color: #7c3aed;
    box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
}

.btn-block {
    width: 100%;
    margin-top: 1rem;
}

.error-message {
    color: #dc2626;
    font-size: 0.8rem;
    margin-top: 0.25rem;
    display: block;
}

.success-message {
    background: #10b981;
    color: white;
    padding: 0.75rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    text-align: center;
}

.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #e2e8f0;
}

.auth-footer a {
    color: #7c3aed;
    text-decoration: none;
    font-weight: 500;
}

.auth-footer a:hover {
    text-decoration: underline;
}
</style>

<script>
const API_BASE_URL = 'http://127.0.0.1:8000';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    
    // clear previous errors
    document.getElementById('phoneError').textContent = '';
    document.getElementById('passwordError').textContent = '';
    
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    loginBtn.textContent = 'در حال ورود...';
    
    try {
        const response = await fetch(`${API_BASE_URL}/api/account/login/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ phone, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // ذخیره توکن در localStorage
            localStorage.setItem('auth_token', data.token);
            localStorage.setItem('user_phone', phone);
            
            // نمایش پیام موفقیت
            showMessage('ورود موفقیت آمیز! در حال انتقال...', 'success');
            
            // انتقال به صفحه اصلی
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        } else {
            // نمایش خطاها
            if (data.non_field_errors) {
                showMessage(data.non_field_errors[0], 'error');
            }
            if (data.phone) {
                document.getElementById('phoneError').textContent = data.phone[0];
            }
            if (data.password) {
                document.getElementById('passwordError').textContent = data.password[0];
            }
        }
    } catch (error) {
        console.error('Error:', error);
        showMessage('خطا در ارتباط با سرور', 'error');
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'ورود';
    }
});

function showMessage(message, type) {
    const existingMsg = document.querySelector('.success-message, .error-message-global');
    if (existingMsg) existingMsg.remove();
    
    const msgDiv = document.createElement('div');
    msgDiv.className = type === 'success' ? 'success-message' : 'error-message-global';
    msgDiv.textContent = message;
    msgDiv.style.cssText = `
        background: ${type === 'success' ? '#10b981' : '#dc2626'};
        color: white;
        padding: 0.75rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        text-align: center;
    `;
    
    const form = document.getElementById('loginForm');
    form.insertBefore(msgDiv, form.firstChild);
    
    setTimeout(() => {
        msgDiv.remove();
    }, 3000);
}
</script>
{% endblock %}
