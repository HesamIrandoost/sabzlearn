<!-- templates/courses/video_player.html - نسخه ساده شده -->
{% extends 'base.html' %}
{% load static %}

{% block title %}تماشای ویدیو | سبزلرن{% endblock %}

{% block extra_css %}
<style>
.video-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1.5rem;
}
.video-player-wrapper {
    background: #0f172a;
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 2rem;
}
.video-player {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
}
.video-info {
    background: white;
    border-radius: 20px;
    padding: 1.5rem;
    margin-top: 1rem;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}
.video-title-large {
    font-size: 1.5rem;
    color: #1e293b;
    margin-bottom: 0.5rem;
}
.course-link {
    color: var(--primary-color);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
}
.playlist-sidebar {
    background: white;
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    margin-top: 2rem;
}
.playlist-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    border-bottom: 1px solid #e2e8f0;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 12px;
}
.playlist-item:hover {
    background: #f8fafc;
}
.playlist-item.active {
    background: rgba(44, 83, 100, 0.1);
    border-right: 3px solid var(--primary-color);
}
.playlist-status {
    width: 24px;
    text-align: center;
}
.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
}
.nav-btn {
    background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
}
.nav-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    opacity: 0.9;
}
.nav-btn:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
}
.loading-state {
    text-align: center;
    padding: 4rem;
}
.loading-spinner {
    width: 50px;
    height: 50px;
    border: 3px solid #e2e8f0;
    border-top-color: var(--primary-color);
    border-radius: 50%;
    margin: 0 auto 1rem;
    animation: spin 1s linear infinite;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}
.error-state {
    text-align: center;
    padding: 4rem;
}
.btn-primary {
    background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 40px;
    cursor: pointer;
}
</style>
{% endblock %}

{% block content %}
<div class="video-container">
    <div id="loading" class="loading-state">
        <div class="loading-spinner"></div>
        <p>در حال بارگذاری ویدیو...</p>
    </div>
    
    <div id="videoContent" style="display: none;">
        <div class="video-player-wrapper">
            <video id="videoPlayer" class="video-player" controls controlsList="nodownload">
                <source id="videoSource" src="" type="video/mp4">
                مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
            </video>
        </div>
        
        <div class="video-info">
            <a href="#" id="courseLink" class="course-link">← بازگشت به دوره</a>
            <h1 id="videoTitle" class="video-title-large"></h1>
        </div>
        
        <div class="playlist-sidebar">
            <h3 style="margin-bottom: 1rem;">لیست پخش</h3>
            <div id="playlist"></div>
            <div class="controls">
                <button id="prevBtn" class="nav-btn" disabled>‹ قبلی</button>
                <button id="nextBtn" class="nav-btn" disabled>بعدی ›</button>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE_URL = 'http://127.0.0.1:8000';
const courseSlug = '{{ course_slug }}';
const videoId = parseInt('{{ video_id }}');
let token = localStorage.getItem('auth_token');

let courseData = null;
let allVideos = [];
let currentVideoIndex = 0;
async function loadVideoData() {
    console.log('Loading video data...', courseSlug, videoId);
    
    try {
        const headers = {};
        if (token) {
            headers['Authorization'] = `Token ${token}`;
        }
        
        // آدرس API رو چاپ کن
        const apiUrl = `${API_BASE_URL}/api/course/${courseSlug}/video/${videoId}/`;
        console.log('API URL:', apiUrl);
        
        // دریافت اطلاعات ویدیو از API
        const videoResponse = await fetch(apiUrl, {
            headers: headers
        });
        
        console.log('Response status:', videoResponse.status);
        console.log('Response ok:', videoResponse.ok);
        
        if (!videoResponse.ok) {
            const errorText = await videoResponse.text();
            console.error('Error response:', errorText);
            
            try {
                const error = JSON.parse(errorText);
                if (error.need_purchase) {
                    alert('برای تماشای این ویدیو باید دوره را خریداری کنید');
                    window.location.href = `/course/${courseSlug}/`;
                    return;
                }
            } catch(e) {
                console.error('Not JSON response');
            }
            throw new Error(`HTTP ${videoResponse.status}`);
        }
        
        const videoData = await videoResponse.json();
        console.log('Video data received:', videoData);
        
        if (!videoData.video_url) {
            throw new Error('آدرس ویدیو پیدا نشد!');
        }
        
        // ... بقیه کد به همین صورت
        
        // دریافت اطلاعات کامل دوره برای لیست پخش
        const courseResponse = await fetch(`${API_BASE_URL}/api/course/${courseSlug}/`, {
            headers: headers
        });
        
        if (courseResponse.ok) {
            courseData = await courseResponse.json();
            console.log('Course data loaded');
            
            // ساخت لیست ویدیوها
            allVideos = [];
            if (courseData.sections) {
                courseData.sections.forEach(section => {
                    if (section.videos) {
                        section.videos.forEach(video => {
                            allVideos.push({
                                ...video,
                                sectionTitle: section.title
                            });
                        });
                    }
                });
            }
            
            currentVideoIndex = allVideos.findIndex(v => v.id === videoId);
            if (currentVideoIndex === -1 && allVideos.length > 0) {
                currentVideoIndex = 0;
            }
        }
        
        // پخش ویدیو
        const videoElement = document.getElementById('videoPlayer');
        const videoSource = document.getElementById('videoSource');
        const videoTitle = document.getElementById('videoTitle');
        const courseLink = document.getElementById('courseLink');
        
        console.log('Setting video source to:', videoData.video_url);
        videoSource.src = videoData.video_url;
        videoElement.load();
        videoTitle.textContent = videoData.title;
        courseLink.href = `/course/${courseSlug}/`;
        
        // خطایابی ویدیو
        videoElement.onerror = function(e) {
            console.error('Video error:', e);
            console.error('Video src:', videoSource.src);
            alert('خطا در پخش ویدیو. لطفاً مطمئن شوید فایل ویدیو وجود دارد.');
        };
        
        videoElement.onloadedmetadata = function() {
            console.log('Video loaded successfully, duration:', videoElement.duration);
        };
        
        // نمایش محتوا
        document.getElementById('loading').style.display = 'none';
        document.getElementById('videoContent').style.display = 'block';
        
        // بارگذاری لیست پخش
        if (allVideos.length > 0) {
            loadPlaylist();
            setupNavigation();
        }
        

    } catch (error) {
        console.error('Error in loadVideoData:', error);
        document.getElementById('loading').innerHTML = `
            <div class="error-state">
                <h3>❌ خطا در بارگذاری ویدیو</h3>
                <p style="color: #666;">${error.message}</p>
                <p style="color: #666; font-size: 0.8rem;">بررسی کن سرور روش هست؟</p>
                <button class="btn-primary" onclick="location.reload()">تلاش مجدد</button>
            </div>
        `;
    }
}

function loadPlaylist() {
    const playlistDiv = document.getElementById('playlist');
    if (!playlistDiv || allVideos.length === 0) return;
    
    playlistDiv.innerHTML = allVideos.map((video, index) => {
        const isActive = index === currentVideoIndex;
        return `
            <div class="playlist-item ${isActive ? 'active' : ''}" onclick="goToVideo(${index})">
                <div class="playlist-status">
                    ${video.is_free ? '🔓' : '🔒'}
                </div>
                <div style="flex: 1;">
                    <div style="font-weight: 500;">${escapeHtml(video.title)}</div>
                    <div style="font-size: 0.75rem; color: #64748b;">${video.sectionTitle || 'بخش اصلی'}</div>
                </div>
            </div>
        `;
    }).join('');
}

function goToVideo(index) {
    if (index === currentVideoIndex) return;
    
    const video = allVideos[index];
    const isEnrolled = courseData?.is_enrolled;
    
    if (!isEnrolled && !video.is_free) {
        if (confirm('برای تماشای این ویدیو باید دوره را خریداری کنید.')) {
            window.location.href = `/course/${courseSlug}/`;
        }
        return;
    }
    
    // رفتن به ویدیو جدید
    window.location.href = `/video/${courseSlug}/${video.id}/`;
}

function setupNavigation() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    if (prevBtn) {
        prevBtn.disabled = currentVideoIndex === 0;
        prevBtn.onclick = () => {
            if (currentVideoIndex > 0) {
                goToVideo(currentVideoIndex - 1);
            }
        };
    }
    
    if (nextBtn) {
        nextBtn.disabled = currentVideoIndex === allVideos.length - 1;
        nextBtn.onclick = () => {
            if (currentVideoIndex < allVideos.length - 1) {
                goToVideo(currentVideoIndex + 1);
            }
        };
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// اجرا وقتی صفحه لود شد
document.addEventListener('DOMContentLoaded', function() {
    loadVideoData();
});
</script>
{% endblock %}
