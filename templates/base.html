<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="آکادمی برنامه‌نویسی سبزلرن - آموزش تخصصی برنامه‌نویسی از صفر تا استخدام">
    <title>{% block title %}سبزلرن | آکادمی برنامه‌نویسی از صفر تا استخدام{% endblock %}</title>
    
    {% load static %}

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'includes/header.html' %}
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% include 'includes/footer.html' %}

</html>
