<script>
// Theme Manager Class
class ThemeManager {
    constructor() {
        this.themes = [
            { name: 'night', className: 'theme-night', icon: 'fa-moon', title: 'تم شب' },
            { name: 'coffee', className: 'theme-coffee', icon: 'fa-mug-hot', title: 'تم قهوه' },
            { name: 'emerald', className: 'theme-emerald', icon: 'fa-gem', title: 'تم زمرد' }
        ];
        this.currentTheme = localStorage.getItem('siteTheme') || 'night';
        this.init();
    }
    
    init() {
        this.applyTheme(this.currentTheme);
        const btn = document.getElementById('gradientSwitchBtn');
        if (btn) {
            btn.addEventListener('click', () => this.cycleTheme());
        }
    }
    
    applyTheme(themeName) {
        const theme = this.themes.find(t => t.name === themeName);
        if (!theme) return;
        
        const body = document.body;
        const hero = document.getElementById('heroSection');
        
        // Remove existing theme classes
        this.themes.forEach(t => {
            body.classList.remove(t.className);
            if (hero) hero.classList.remove(t.name);
        });
        
        // Add new theme classes
        body.classList.add(theme.className);
        if (hero) hero.classList.add(theme.name);
        
        // Update button icon
        const btn = document.getElementById('gradientSwitchBtn');
        if (btn) {
            btn.innerHTML = `<i class="fas ${theme.icon}"></i>`;
            btn.title = `تغییر به ${this.getNextTheme().title}`;
        }
        
        this.currentTheme = themeName;
        localStorage.setItem('siteTheme', themeName);
    }
    
    getNextTheme() {
        const currentIndex = this.themes.findIndex(t => t.name === this.currentTheme);
        const nextIndex = (currentIndex + 1) % this.themes.length;
        return this.themes[nextIndex];
    }
    
    cycleTheme() {
        const nextTheme = this.getNextTheme();
        this.applyTheme(nextTheme.name);
    }
}

// Auth Manager Class
class AuthManager {
    constructor() {
        this.apiBase = 'http://127.0.0.1:8000';
        this.init();
    }
    
    init() {
        this.updateAuthLinks();
    }
    
    async updateAuthLinks() {
        const token = localStorage.getItem('auth_token');
        const authLinksDiv = document.getElementById('authLinks');
        
        if (!authLinksDiv) return;
        
        if (token) {
            authLinksDiv.innerHTML = `
                <a href="/account/profile/" class="auth-link profile-link">
                    <i class="fas fa-user-circle"></i>
                    پروفایل
                </a>
                <button id="logoutNavBtn" class="auth-link logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    خروج
                </button>
            `;
            
            const logoutBtn = document.getElementById('logoutNavBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => this.handleLogout(e, token));
            }
        } else {
            authLinksDiv.innerHTML = `
                <a href="/account/login/" class="auth-link login-link">
                    <i class="fas fa-sign-in-alt"></i>
                    ورود
                </a>
                <a href="/account/register/" class="auth-link register-link">
                    <i class="fas fa-user-plus"></i>
                    ثبت نام
                </a>
            `;
        }
    }
    
    async handleLogout(event, token) {
        event.preventDefault();
        try {
            await fetch(`${this.apiBase}/api/account/logout/`, {
                method: 'POST',
                headers: { 'Authorization': `Token ${token}` }
            });
        } catch (error) {
            console.error('Logout error:', error);
        } finally {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_phone');
            document.cookie = 'auth_token=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
            window.location.href = '/';
        }
    }
}

// Mobile Menu Manager
class MobileMenuManager {
    constructor() {
        this.init();
    }
    
    init() {
        const menuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        
        if (menuBtn && navLinks) {
            menuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                menuBtn.classList.toggle('active');
            });
        }
    }
}

// Initialize all managers
document.addEventListener('DOMContentLoaded', () => {
    new ThemeManager();
    new AuthManager();
    new MobileMenuManager();
});
</script>
